<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>MM99 - Thẻ Cào May Mắn</title>
<style>
:root{--gold:#ffd36d;--hot:#ff3fc8;--cyan:#26e7ff;--deep:#071026;--ink:#0b1026;--cream:#fff4cf;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#fff;background:radial-gradient(circle at 18% 8%,#123c78 0,#07142d 35%,#050610 78%);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 85% 20%,rgba(255,199,76,.18),transparent 28%),radial-gradient(circle at 35% 92%,rgba(38,231,255,.12),transparent 35%),linear-gradient(115deg,transparent 0 45%,rgba(255,255,255,.04) 50%,transparent 55% 100%);pointer-events:none;animation:shine 8s linear infinite}.spark{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.8) 0 1px,transparent 1.7px);background-size:46px 46px;opacity:.18;mask-image:linear-gradient(#000,transparent 92%)}@keyframes shine{0%{filter:hue-rotate(0)}50%{filter:hue-rotate(14deg)}100%{filter:hue-rotate(0)}}
.shell{width:min(94vw,520px);margin:clamp(10px,2.5vh,26px) auto;padding:14px;border-radius:34px;background:linear-gradient(145deg,rgba(18,39,86,.96),rgba(7,9,26,.98));box-shadow:0 0 0 1px rgba(255,211,109,.45),0 0 0 5px rgba(33,223,255,.18),0 30px 90px rgba(0,0,0,.55),inset 0 0 28px rgba(38,231,255,.22);position:relative;overflow:hidden}.shell:before{content:"";position:absolute;inset:8px;border-radius:28px;border:1px solid rgba(49,232,255,.55);box-shadow:inset 0 0 18px rgba(49,232,255,.25);pointer-events:none}.head{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 12px 4px}.logo{width:105px;filter:drop-shadow(0 0 16px rgba(65,212,255,.65))}.title{line-height:.92;font-weight:1000;letter-spacing:.06em;font-size:clamp(34px,10vw,62px);text-transform:uppercase;background:linear-gradient(#fff7c6 0%,#ffd169 38%,#ff8a24 76%,#a94d00 100%);-webkit-background-clip:text;color:transparent;text-shadow:0 8px 22px rgba(255,129,26,.16)}.sub{text-align:center;font-size:12px;font-weight:900;letter-spacing:.38em;color:rgba(255,255,255,.78);margin:2px 0 12px;text-transform:uppercase}.panel{border-radius:28px;padding:18px 12px 20px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}.instruction{text-align:center;margin:0 0 16px}.instruction h1{margin:0;font-size:clamp(26px,7vw,39px);line-height:1.1;color:var(--cream);text-shadow:0 0 20px rgba(255,232,168,.3)}.instruction p{margin:8px auto 0;max-width:420px;font-weight:800;color:rgba(255,255,255,.78);font-size:14px;line-height:1.35}.ticketWrap{position:relative;width:min(92vw,430px);aspect-ratio:1/1;margin:0 auto;border-radius:30px;padding:12px;background:linear-gradient(135deg,#ffe38d,#ff68aa 32%,#763bff 62%,#21dcff 100%);box-shadow:0 24px 60px rgba(0,0,0,.45),0 0 34px rgba(255,69,199,.38),inset 0 0 0 1px rgba(255,255,255,.32);overflow:hidden}.ticketWrap:before{content:"";position:absolute;inset:-60%;background:conic-gradient(from 0deg,transparent,rgba(255,255,255,.34),transparent 28%);animation:spin 6s linear infinite}.ticket{position:relative;height:100%;border-radius:23px;border:2px dashed rgba(255,255,255,.52);background:linear-gradient(140deg,rgba(255,247,207,.45),rgba(255,64,174,.18),rgba(44,230,255,.28));overflow:hidden;padding:18px;display:flex;flex-direction:column}.ticket:before,.ticket:after{content:"";position:absolute;top:50%;width:28px;height:28px;background:#080b18;border-radius:50%;transform:translateY(-50%)}.ticket:before{left:-16px}.ticket:after{right:-16px}@keyframes spin{to{transform:rotate(360deg)}}.ticketTop{display:flex;align-items:center;justify-content:space-between;gap:10px}.ticketLogo{width:94px;filter:drop-shadow(0 0 12px rgba(38,231,255,.5))}.pill{padding:10px 16px;border-radius:999px;background:rgba(104,29,132,.5);font-weight:1000;letter-spacing:.18em;color:#fff5bb;font-size:12px;white-space:nowrap}.scratchBox{position:relative;flex:1;margin:24px auto 16px;width:92%;border-radius:23px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.38),0 12px 30px rgba(0,0,0,.22);background:#fff1cd}.prizeLayer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:linear-gradient(135deg,#fff4ca,#ffe0a6 43%,#fff7da);color:#8b3500;overflow:hidden}.wm{position:absolute;inset:-20px;opacity:.16;background-size:145px 70px;background-image:repeating-linear-gradient(-28deg,transparent 0 20px,rgba(139,53,0,.16) 20px 22px,transparent 22px 42px)}.wm:after{content:"MM99 MAY MẮN  MM99 VERIFY  CÀO LỚP BẠC";position:absolute;inset:0;display:grid;place-items:center;font-size:22px;font-weight:1000;letter-spacing:.08em;transform:rotate(-18deg);color:#8b3500;line-height:2.5;word-spacing:18px}.resultLabel{font-size:13px;font-weight:1000;letter-spacing:.42em;margin-bottom:6px}.amount{font-size:clamp(54px,16vw,82px);font-weight:1000;line-height:.95;text-shadow:0 8px 22px rgba(139,53,0,.18)}.meta{margin-top:10px;font-weight:1000;font-size:14px;letter-spacing:.02em}.attemptMeta{margin-top:4px;font-weight:900;font-size:12px;color:#9c5424}.scratchCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}.coverText{position:absolute;inset:0;display:grid;place-items:center;text-align:center;pointer-events:none;font-weight:1000;letter-spacing:.05em;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.32);font-size:20px;line-height:1.15}.coverText small{display:block;font-size:11px;margin-top:8px;opacity:.8;letter-spacing:.18em}.ticketFoot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto}.code{padding:9px 14px;border-radius:12px;background:rgba(87,28,120,.46);font-weight:1000;letter-spacing:.05em;font-size:12px}.live{font-weight:1000;letter-spacing:.12em;font-size:12px;color:#fff}.progress{height:7px;flex:1;max-width:135px;border-radius:99px;background:rgba(0,0,0,.24);overflow:hidden}.bar{height:100%;width:0%;border-radius:inherit;background:linear-gradient(90deg,#ffd66a,#ff4bc5,#25e6ff);transition:width .18s ease}.toast{position:fixed;left:50%;top:22%;transform:translateX(-50%);z-index:20;background:rgba(12,13,28,.92);border:1px solid rgba(255,211,109,.65);box-shadow:0 15px 40px rgba(0,0,0,.45);border-radius:18px;padding:16px 20px;color:#fff6cf;font-weight:1000;display:none;max-width:330px;text-align:center}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:15}.piece{position:absolute;width:8px;height:14px;border-radius:2px;animation:fall 1.8s ease-out forwards}@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}@media(max-width:520px){.shell{width:100vw;min-height:100svh;margin:0;border-radius:0;padding:10px 8px 18px}.shell:before{border-radius:22px}.head{justify-content:flex-start;padding-left:18px}.logo{width:100px}.title{font-size:46px;line-height:.88}.sub{font-size:11px;letter-spacing:.28em;text-align:left;padding-left:190px;margin-top:-12px}.panel{padding:16px 6px 20px;border-radius:24px}.instruction h1{font-size:34px}.instruction p{font-size:14px;padding:0 8px}.ticketWrap{width:92vw;max-width:430px}.scratchBox{margin-top:22px;width:91%}.ticketLogo{width:92px}.pill{font-size:11px;padding:9px 13px}.amount{font-size:64px}.meta{font-size:13px}.code,.live{font-size:11px}}@media(max-width:380px){.logo{width:86px}.title{font-size:39px}.sub{padding-left:160px;font-size:10px}.instruction h1{font-size:28px}.ticket{padding:14px}.scratchBox{margin-top:18px}.amount{font-size:54px}.pill{letter-spacing:.12em}.ticketLogo{width:80px}}
</style>
</head>
<body>
<div class="spark"></div><div class="confetti" id="confetti"></div><div class="toast" id="toast"></div>
<main class="shell">
  <header class="head"><img class="logo" src="mm99-logo.png" alt="MM99"><div class="title">Hộp Quà<br>May Mắn</div></header>
  <div class="sub">Premium Scratch Game</div>
  <section class="panel">
    <div class="instruction"><h1>Cào lớp bạc để nhận thưởng</h1><p>Mở link là có thể cào ngay. Cào gần 50% khu vực bạc, kết quả sẽ tự động hiển thị.</p></div>
    <div class="ticketWrap">
      <div class="ticket">
        <div class="ticketTop"><img class="ticketLogo" src="mm99-logo.png" alt="MM99"><div class="pill">THẺ MAY MẮN</div></div>
        <div class="scratchBox" id="scratchBox">
          <div class="prizeLayer">
            <div class="wm"></div>
            <div class="resultLabel">CHÚC MỪNG</div>
            <div class="amount" id="amount">8.888</div>
            <div class="meta" id="resultTime">--:--:-- --/--/----</div>
            <div class="attemptMeta" id="attemptLine">Lượt hôm nay: 1/2</div>
          </div>
          <canvas class="scratchCanvas" id="scratch"></canvas>
          <div class="coverText" id="coverText"><div>CÀO LỚP BẠC<small>MM99 VERIFY</small></div></div>
        </div>
        <div class="ticketFoot"><div class="code" id="code">MM99-00000</div><div class="progress"><div class="bar" id="bar"></div></div><div class="live">LIVE CODE</div></div>
      </div>
    </div>
  </section>
</main>
<script>
(()=>{
'use strict';
const prizes=[['4888',5],['6,888',5],['8.888',25],['9.888',25],['10.888',10],['12,888',10],['13.888',8],['14.888',6],['15.888',3],['18.888',3]];
const $=id=>document.getElementById(id); const canvas=$('scratch'), box=$('scratchBox'), amount=$('amount'), timeEl=$('resultTime'), attemptLine=$('attemptLine'), codeEl=$('code'), bar=$('bar'), coverText=$('coverText'), toast=$('toast'), confetti=$('confetti');
const ctx=canvas.getContext('2d',{willReadFrequently:true}); let W=0,H=0,dpr=1,isDown=false,revealed=false,started=false,blocked=false,last=null,brush=26,claimedAttempt=0;
const todayKey=()=>{const d=new Date();return 'mm99_scratch_'+d.getFullYear()+'_'+(d.getMonth()+1)+'_'+d.getDate()};
const formatDate=(d=new Date())=>String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
const rnd=n=>Math.random()*n; function pickPrize(){let r=Math.random()*100,s=0;for(const [v,p] of prizes){s+=p;if(r<=s)return v}return prizes[prizes.length-1][0]}
function getCount(){try{return +(localStorage.getItem(todayKey())||0)}catch(e){return 0}} function setCount(v){try{localStorage.setItem(todayKey(),String(v))}catch(e){}}
function showToast(msg){toast.textContent=msg;toast.style.display='block';setTimeout(()=>toast.style.display='none',2200)}
function initTicket(){const count=getCount();blocked=count>=2;claimedAttempt=Math.min(count+1,2); amount.textContent=pickPrize(); timeEl.textContent=formatDate(); attemptLine.textContent='Lượt hôm nay: '+claimedAttempt+'/2'; codeEl.textContent='MM99-'+Math.random().toString(36).slice(2,7).toUpperCase(); if(blocked){showToast('Hôm nay bạn đã hết lượt.'); coverText.innerHTML='<div>HẾT LƯỢT HÔM NAY<small>QUAY LẠI NGÀY MAI</small></div>';}}
function resize(){const r=box.getBoundingClientRect();dpr=Math.min(window.devicePixelRatio||1,2);W=Math.max(1,Math.round(r.width));H=Math.max(1,Math.round(r.height));canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);drawCover();}
function drawCover(){ctx.globalCompositeOperation='source-over';const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#eef5f8');g.addColorStop(.32,'#b6c5cf');g.addColorStop(.55,'#f6fbff');g.addColorStop(.75,'#a9b7c2');g.addColorStop(1,'#e5edf1');ctx.fillStyle=g;roundRect(0,0,W,H,22);ctx.fill();ctx.save();ctx.globalAlpha=.26;ctx.strokeStyle='#7f95a5';ctx.lineWidth=3;for(let x=-H;x<W+H;x+=18){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H,H);ctx.stroke()}ctx.globalAlpha=.18;ctx.fillStyle='#fff';for(let i=0;i<80;i++){ctx.beginPath();ctx.arc(rnd(W),rnd(H),rnd(1.3)+.4,0,Math.PI*2);ctx.fill()}ctx.restore();}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function pos(e){const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return {x:(p.clientX-r.left),y:(p.clientY-r.top)}}
function scratchAt(x,y){ctx.globalCompositeOperation='destination-out';const grad=ctx.createRadialGradient(x,y,3,x,y,brush);grad.addColorStop(0,'rgba(0,0,0,1)');grad.addColorStop(.72,'rgba(0,0,0,.9)');grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,brush,0,Math.PI*2);ctx.fill();}
function lineScratch(a,b){const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),steps=Math.max(1,Math.ceil(dist/(brush*.38)));for(let i=0;i<=steps;i++){scratchAt(a.x+dx*i/steps,a.y+dy*i/steps)}}
function percent(){const img=ctx.getImageData(0,0,canvas.width,canvas.height).data;let clear=0,total=0;for(let i=3;i<img.length;i+=16){total++; if(img[i]<80) clear++;}return clear/total}
function startAttempt(){if(started)return; started=true; const c=getCount(); if(c>=2){blocked=true;showToast('Hôm nay bạn đã hết lượt.');return} setCount(c+1); claimedAttempt=c+1; attemptLine.textContent='Lượt hôm nay: '+claimedAttempt+'/2'; timeEl.textContent=formatDate();}
function move(e){if(!isDown||blocked||revealed)return; e.preventDefault();const p=pos(e); if(last) lineScratch(last,p); else scratchAt(p.x,p.y); last=p; const pc=percent();bar.style.width=Math.min(100,Math.round(pc*100))+'%'; if(pc>.5){reveal();}}
function reveal(){if(revealed)return;revealed=true;ctx.clearRect(0,0,W,H);coverText.style.display='none';bar.style.width='100%';burst();showToast('Chúc mừng!');}
function burst(){const colors=['#ffd66a','#ff4bc5','#25e6ff','#9cff96','#ff8a24'];for(let i=0;i<80;i++){const el=document.createElement('i');el.className='piece';el.style.left=(20+rnd(60))+'vw';el.style.top=(-20-rnd(80))+'px';el.style.background=colors[i%colors.length];el.style.animationDelay=(rnd(.35))+'s';el.style.transform='rotate('+rnd(360)+'deg)';confetti.appendChild(el);setTimeout(()=>el.remove(),2400)}}
canvas.addEventListener('pointerdown',e=>{if(blocked){showToast('Hôm nay bạn đã hết lượt.');return}startAttempt();isDown=true;last=pos(e);scratchAt(last.x,last.y);move(e);canvas.setPointerCapture?.(e.pointerId)});
canvas.addEventListener('pointermove',move);['pointerup','pointercancel','pointerleave'].forEach(t=>canvas.addEventListener(t,()=>{isDown=false;last=null}));
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
window.addEventListener('resize',()=>setTimeout(resize,120));initTicket();requestAnimationFrame(resize);
})();
</script>
</body>
</html>

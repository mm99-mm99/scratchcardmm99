<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>MM99 - Vé Cào May Mắn</title>
<style>
:root{--gold:#ffd36b;--gold2:#ff9d2e;--cyan:#20d8ff;--pink:#ff4bd8;--purple:#7c42ff;--ink:#071021;--paper:#fff3d4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#030713;color:#fff;overflow-x:hidden} body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(40,180,255,.35),transparent 30%),radial-gradient(circle at 80% 10%,rgba(255,177,46,.28),transparent 28%),radial-gradient(circle at 50% 85%,rgba(255,60,190,.22),transparent 35%),linear-gradient(135deg,#07152c,#070714 50%,#120716);z-index:-3} body:after{content:"";position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.28) 1px,transparent 1px);background-size:34px 34px;opacity:.25;animation:stars 18s linear infinite;z-index:-2}@keyframes stars{to{transform:translateY(34px)}}
.wrap{width:min(1040px,96vw);margin:0 auto;padding:18px 10px 26px}.machine{position:relative;min-height:calc(100vh - 28px);border-radius:34px;padding:22px clamp(14px,3vw,34px);background:linear-gradient(145deg,rgba(17,34,70,.88),rgba(16,12,32,.92));border:1px solid rgba(255,224,136,.35);box-shadow:0 0 0 2px rgba(32,216,255,.15),0 25px 80px rgba(0,0,0,.55),inset 0 0 80px rgba(255,255,255,.06);overflow:hidden}.machine:before{content:"";position:absolute;inset:12px;border-radius:28px;border:2px solid rgba(32,216,255,.55);box-shadow:0 0 28px rgba(32,216,255,.55),inset 0 0 40px rgba(32,216,255,.18);pointer-events:none}.machine:after{content:"";position:absolute;inset:-40%;background:conic-gradient(from 210deg,transparent,rgba(255,255,255,.09),transparent 18%,rgba(255,214,107,.07),transparent 35%);animation:spin 16s linear infinite;pointer-events:none}@keyframes spin{to{transform:rotate(360deg)}}
.top{position:relative;z-index:2;display:flex;gap:18px;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:18px}.logo{width:132px;filter:drop-shadow(0 0 18px rgba(58,196,255,.75))}.title h1{margin:0;font-size:clamp(30px,6vw,66px);line-height:.92;letter-spacing:.08em;background:linear-gradient(#fff1b1,#ffbc43 45%,#ff7726);-webkit-background-clip:text;color:transparent;text-shadow:0 8px 30px rgba(255,149,30,.26)}.title p{margin:8px 0 0;letter-spacing:.28em;font-size:13px;color:rgba(255,255,255,.75);font-weight:800}.status{display:flex;flex-direction:column;gap:10px;align-items:flex-end}.pill{min-width:142px;text-align:center;padding:11px 16px;border:1px solid rgba(255,218,128,.55);border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(0,0,0,.24));box-shadow:inset 0 1px 0 rgba(255,255,255,.12);font-weight:900;color:#ffe7a3;font-size:14px}.stage{position:relative;z-index:2;margin-top:26px;padding:22px;border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.13);box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}.headline{text-align:center;margin-bottom:16px}.headline h2{margin:0;font-size:clamp(25px,4vw,44px);color:#fff3ca;text-shadow:0 0 25px rgba(255,207,99,.35)}.headline p{margin:8px auto 0;color:rgba(255,255,255,.76);font-weight:700}.ticket-zone{position:relative;display:flex;justify-content:center;align-items:center;padding:22px 0 28px;min-height:520px;perspective:1100px}.roll-shadow{position:absolute;width:min(720px,90%);height:52px;bottom:26px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,.55),transparent 70%);filter:blur(8px)}
.ticket{position:relative;width:min(720px,92vw);min-height:455px;border-radius:28px;background:linear-gradient(135deg,#fff8dd 0%,#ffd97d 20%,#ff417f 50%,#6636ff 78%,#18d6ff 100%);box-shadow:0 38px 75px rgba(0,0,0,.55),0 0 52px rgba(255,96,212,.32),inset 0 0 0 2px rgba(255,255,255,.38);transform:rotateX(2deg);overflow:hidden}.ticket:before,.ticket:after{content:"";position:absolute;top:0;bottom:0;width:46px;background:radial-gradient(circle at center,rgba(5,8,20,1) 0 9px,transparent 10px) 50% 16px/46px 44px repeat-y,linear-gradient(90deg,rgba(255,255,255,.35),transparent);opacity:.95}.ticket:before{left:-21px}.ticket:after{right:-21px;transform:scaleX(-1)}.ticket .shine{position:absolute;inset:0;background:linear-gradient(115deg,transparent 10%,rgba(255,255,255,.35) 22%,transparent 34%,transparent 65%,rgba(255,255,255,.24) 75%,transparent 86%);mix-blend-mode:screen;animation:sweep 4.5s ease-in-out infinite}@keyframes sweep{0%,100%{transform:translateX(-26%)}50%{transform:translateX(26%)}}.ticket-inner{position:absolute;inset:18px;border-radius:22px;border:2px dashed rgba(255,255,255,.55);background:linear-gradient(160deg,rgba(255,255,255,.28),rgba(255,255,255,.08));backdrop-filter:blur(3px);overflow:hidden}.ticket-head{position:absolute;left:26px;right:26px;top:22px;display:flex;align-items:center;justify-content:space-between}.ticket-logo{width:110px;filter:drop-shadow(0 0 12px rgba(255,255,255,.55))}.badge{padding:10px 16px;border-radius:999px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.35);font-weight:1000;letter-spacing:.12em;color:#fff5ba}.scratch-area{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:min(540px,82%);height:245px;border-radius:24px;background:linear-gradient(145deg,#fff8d3,#ffd46e 50%,#fff2b6);box-shadow:inset 0 0 0 3px rgba(255,255,255,.72),0 20px 50px rgba(0,0,0,.28),0 0 30px rgba(255,230,122,.38);overflow:hidden}.prize-panel{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 50% 40%,#fff7d7,#ffd25a 45%,#ff8c2d 100%)}.watermark{position:absolute;inset:-40px;background-image:repeating-linear-gradient(-25deg,rgba(80,26,0,.08) 0 1px,transparent 1px 48px);}.wm-text{position:absolute;inset:0;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:18px 28px;transform:rotate(-18deg);opacity:.13;font-weight:1000;font-size:34px;color:#4b1700}.prize-content{position:relative;z-index:1}.prize-content small{display:block;font-weight:1000;letter-spacing:.22em;color:#6a2300}.prize{font-size:clamp(58px,9vw,104px);font-weight:1000;line-height:.9;background:linear-gradient(#5c1700,#a12d00,#5c1700);-webkit-background-clip:text;color:transparent;text-shadow:0 10px 35px rgba(255,255,255,.36)}.result-time{margin-top:12px;color:#722500;font-weight:900}.scratch-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab}.scratch-canvas:active{cursor:grabbing}.scratch-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;text-align:center;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,.7);font-weight:1000;letter-spacing:.1em;font-size:18px;transition:.2s}.progress{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);width:min(420px,72%);height:12px;border-radius:999px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.3);overflow:hidden}.bar{height:100%;width:0%;background:linear-gradient(90deg,#fff06d,#ff8b2e,#ff49cc);box-shadow:0 0 18px rgba(255,220,90,.7)}.ticket-foot{position:absolute;left:30px;right:30px;bottom:18px;display:flex;align-items:center;justify-content:space-between;color:rgba(255,255,255,.85);font-weight:900;font-size:12px;letter-spacing:.13em}.serial{padding:8px 12px;border-radius:12px;background:rgba(0,0,0,.25)}.cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:18px;padding:15px 22px;font-weight:1000;letter-spacing:.08em;color:#261000;background:linear-gradient(180deg,#fff6a2,#ffc24c 55%,#ff8b27);box-shadow:0 14px 28px rgba(255,135,32,.25),inset 0 1px 0 #fff;cursor:pointer}.btn.secondary{background:linear-gradient(180deg,#f3fbff,#8be8ff 55%,#1db7ff);color:#001629}.btn:disabled{filter:grayscale(.9);opacity:.55;cursor:not-allowed}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(120px);z-index:20;padding:14px 18px;border-radius:16px;background:rgba(5,8,20,.88);border:1px solid rgba(255,216,110,.45);color:#ffe9a7;font-weight:900;box-shadow:0 10px 35px rgba(0,0,0,.45);transition:.35s}.toast.show{transform:translateX(-50%) translateY(0)}.confetti{position:fixed;inset:0;pointer-events:none;z-index:10}.revealed .scratch-hint{opacity:0}.revealed .scratch-area{animation:winGlow 1.6s ease-in-out infinite}@keyframes winGlow{50%{box-shadow:inset 0 0 0 3px rgba(255,255,255,.9),0 22px 70px rgba(255,63,205,.42),0 0 70px rgba(255,216,84,.65)}}
@media(max-width:720px){.top{align-items:flex-start}.brand{gap:10px}.logo{width:86px}.status{position:absolute;right:0;top:0}.pill{min-width:114px;font-size:12px;padding:9px 10px}.title h1{font-size:34px;max-width:270px}.title p{font-size:10px}.stage{padding:12px}.ticket-zone{min-height:470px}.ticket{min-height:405px;border-radius:22px}.scratch-area{height:220px;width:86%}.ticket-head{left:22px;right:22px}.ticket-logo{width:88px}.badge{font-size:11px}.prize{font-size:64px}.headline h2{font-size:25px}}
</style>
</head>
<body>
<canvas class="confetti" id="confetti"></canvas>
<div class="wrap"><main class="machine"><section class="top"><div class="brand"><img class="logo" src="mm99-logo.png" alt="MM99"><div class="title"><h1>VÉ CÀO MAY MẮN</h1><p>PREMIUM SCRATCH GAME</p></div></div><div class="status"><div class="pill" id="clock">--:--:--</div><div class="pill" id="tries">Lượt hôm nay: 0/2</div></div></section><section class="stage"><div class="headline"><h2>Cào lớp bạc để nhận thưởng</h2><p>Cào gần 50% khu vực bạc, phần thưởng sẽ tự động hiển thị.</p></div><div class="ticket-zone"><div class="roll-shadow"></div><article class="ticket" id="ticket"><div class="shine"></div><div class="ticket-inner"><div class="ticket-head"><img class="ticket-logo" src="mm99-logo.png" alt="MM99"><div class="badge">THẺ MAY MẮN</div></div><div class="scratch-area" id="scratchArea"><div class="prize-panel"><div class="watermark"></div><div class="wm-text"><span>MM99</span><span>MM99</span><span>MM99</span><span>MM99</span><span>MM99</span><span>MM99</span></div><div class="prize-content"><small>CHÚC MỪNG</small><div class="prize" id="prize">8.888</div><div class="result-time" id="resultTime">--</div></div></div><canvas class="scratch-canvas" id="scratchCanvas"></canvas><div class="scratch-hint" id="scratchHint">CÀO TẠI ĐÂY</div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="ticket-foot"><span class="serial" id="serial">MM99-VERIFY</span><span>LIVE CODE</span></div></div></article></div><div class="cta"><button class="btn" id="newBtn">BẮT ĐẦU</button><button class="btn secondary" id="resetView">LÀM MỚI THẺ</button></div></section></main></div><div class="toast" id="toast"></div>
<script>
(()=>{
const prizes=[{v:'4888',p:5},{v:'6,888',p:5},{v:'8.888',p:25},{v:'9.888',p:25},{v:'10.888',p:10},{v:'12,888',p:10},{v:'13.888',p:8},{v:'14.888',p:6},{v:'15.888',p:3},{v:'18.888',p:3}];
const today=()=>new Date().toLocaleDateString('en-CA');const key='mm99_scratch_ticket_'+today();const max=2;let data=JSON.parse(localStorage.getItem(key)||'{"count":0}');let active=false,revealed=false,drawing=false,last=null,chosen=null;
const $=id=>document.getElementById(id),clock=$('clock'),tries=$('tries'),prizeEl=$('prize'),timeEl=$('resultTime'),serial=$('serial'),canvas=$('scratchCanvas'),area=$('scratchArea'),bar=$('bar'),ticket=$('ticket'),hint=$('scratchHint'),toast=$('toast'),newBtn=$('newBtn'),resetView=$('resetView');const ctx=canvas.getContext('2d',{willReadFrequently:true});
function save(){localStorage.setItem(key,JSON.stringify(data));tries.textContent=`Lượt hôm nay: ${data.count}/${max}`;newBtn.disabled=data.count>=max&& !active}
function pad(n){return String(n).padStart(2,'0')}function tick(){const d=new Date();clock.textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`}setInterval(tick,1000);tick();
function pick(){let r=Math.random()*100,acc=0;for(const it of prizes){acc+=it.p;if(r<=acc)return it.v}return prizes[prizes.length-1].v}
function show(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}
function resizeCanvas(){const rect=area.getBoundingClientRect();const dpr=Math.max(1,Math.min(2.5,devicePixelRatio||1));canvas.width=Math.round(rect.width*dpr);canvas.height=Math.round(rect.height*dpr);canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);if(!revealed)drawCoat(rect.width,rect.height)}
function drawCoat(w,h){ctx.globalCompositeOperation='source-over';const g=ctx.createLinearGradient(0,0,w,h);g.addColorStop(0,'#eef4fb');g.addColorStop(.2,'#9ba8b6');g.addColorStop(.46,'#f4f8ff');g.addColorStop(.72,'#768391');g.addColorStop(1,'#f7fbff');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,.22)';for(let i=-h;i<w;i+=26){ctx.save();ctx.translate(i,0);ctx.rotate(-.7);ctx.fillRect(0,0,7,h*2);ctx.restore()}ctx.fillStyle='rgba(15,22,40,.2)';for(let i=0;i<700;i++){ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*1.8+.5,Math.random()*1.8+.5)}ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='900 18px Arial';ctx.textAlign='center';ctx.fillText('MM99  •  CÀO LỚP BẠC',w/2,h/2-6);ctx.font='800 12px Arial';ctx.fillText('Cào gần 50% để mở thưởng',w/2,h/2+22)}
function scratch(x,y,first=false){if(!active||revealed)return;const r=first?18:26;ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();if(last&&!first){ctx.lineWidth=r*1.65;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(x,y);ctx.stroke()}last={x,y};hint.style.opacity=.15;checkProgress()}
let checking=false;function checkProgress(){if(checking)return;checking=true;requestAnimationFrame(()=>{checking=false;const w=canvas.width,h=canvas.height;const img=ctx.getImageData(0,0,w,h).data;let clear=0,total=0;for(let i=3;i<img.length;i+=16){total++;if(img[i]<40)clear++}const pct=clear/total*100;bar.style.width=Math.min(100,pct*2)+'%';if(pct>=50)reveal()})}
function pointer(e){const rect=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:p.clientX-rect.left,y:p.clientY-rect.top}}
canvas.addEventListener('pointerdown',e=>{if(!active){show(data.count>=max?'Hôm nay đã hết lượt.':'Bấm BẮT ĐẦU trước.');return}drawing=true;last=null;const p=pointer(e);scratch(p.x,p.y,true)});canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const p=pointer(e);scratch(p.x,p.y)});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{drawing=false;last=null}));
function start(){if(active)return;if(data.count>=max){show('Hôm nay đã hết lượt.');return}chosen=pick();prizeEl.textContent=chosen;const d=new Date();timeEl.textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;serial.textContent='MM99-'+Math.random().toString(36).slice(2,7).toUpperCase();data.count++;active=true;revealed=false;ticket.classList.remove('revealed');bar.style.width='0%';hint.style.opacity='1';save();resizeCanvas();show('Bắt đầu cào thẻ.')}newBtn.onclick=start;
resetView.onclick=()=>{if(active&&!revealed){show('Vui lòng cào thẻ hiện tại.');return}active=false;revealed=false;ticket.classList.remove('revealed');bar.style.width='0%';hint.style.opacity='1';resizeCanvas();show('Thẻ đã sẵn sàng.')} ;
function reveal(){if(revealed)return;revealed=true;active=false;ticket.classList.add('revealed');bar.style.width='100%';ctx.clearRect(0,0,canvas.width,canvas.height);save();confettiBurst();show('Chúc mừng!')}
const cf=$('confetti'),cfx=cf.getContext('2d');let parts=[];function fitCf(){cf.width=innerWidth*(devicePixelRatio||1);cf.height=innerHeight*(devicePixelRatio||1);cf.style.width=innerWidth+'px';cf.style.height=innerHeight+'px';cfx.setTransform(devicePixelRatio||1,0,0,devicePixelRatio||1,0,0)}addEventListener('resize',()=>{fitCf();resizeCanvas()});fitCf();resizeCanvas();
function confettiBurst(){parts=[];const colors=['#fff06d','#ff8b2e','#ff4bd8','#20d8ff','#8dffb2'];for(let i=0;i<170;i++)parts.push({x:innerWidth/2,y:innerHeight*.5,vx:(Math.random()-.5)*9,vy:-Math.random()*9-2,g:.12+Math.random()*.08,s:4+Math.random()*8,r:Math.random()*6.28,vr:(Math.random()-.5)*.28,c:colors[i%colors.length],life:120+Math.random()*60});animateCf()}function animateCf(){cfx.clearRect(0,0,innerWidth,innerHeight);parts=parts.filter(p=>p.life-->0);for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.r+=p.vr;cfx.save();cfx.translate(p.x,p.y);cfx.rotate(p.r);cfx.fillStyle=p.c;cfx.globalAlpha=Math.min(1,p.life/40);cfx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.55);cfx.restore()}if(parts.length)requestAnimationFrame(animateCf)}
save();if(data.count>=max)newBtn.disabled=true;
})();
</script>
</body>
</html>

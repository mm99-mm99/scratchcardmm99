<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>MM99 - Thẻ Cào May Mắn</title>
<style>
:root{--gold:#ffd56a;--gold2:#ff9d2e;--blue:#00d8ff;--deep:#071126;--ink:#0b1022;--pink:#ff3fb7;--violet:#7b4dff;--cyan:#42e9ff;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;height:100%;overflow:hidden;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#050816;color:#fff}
body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 15% 20%,rgba(0,195,255,.35),transparent 28%),radial-gradient(circle at 82% 72%,rgba(255,68,166,.28),transparent 30%),radial-gradient(circle at 55% 10%,rgba(255,205,90,.18),transparent 22%),linear-gradient(125deg,#07122b,#0a0618 55%,#140b1f);filter:saturate(1.2);animation:bg 12s ease-in-out infinite alternate} @keyframes bg{to{transform:scale(1.04) rotate(.5deg)}}
#fx{position:fixed;inset:0;pointer-events:none;z-index:1}.wrap{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;padding:18px}.machine{width:min(1040px,96vw);height:min(900px,96vh);border-radius:34px;position:relative;background:linear-gradient(145deg,rgba(9,22,52,.92),rgba(10,8,25,.96));border:1px solid rgba(255,214,111,.38);box-shadow:0 0 0 3px rgba(0,216,255,.12),0 28px 90px rgba(0,0,0,.65),inset 0 0 70px rgba(0,213,255,.12);overflow:hidden}.machine:before{content:"";position:absolute;inset:14px;border-radius:28px;border:2px solid rgba(0,216,255,.55);box-shadow:0 0 28px rgba(0,216,255,.72),inset 0 0 28px rgba(0,216,255,.16);pointer-events:none}.top{height:135px;padding:22px 34px;display:flex;align-items:flex-start;gap:24px;position:relative}.logo{width:142px;filter:drop-shadow(0 0 18px rgba(78,216,255,.95))}.title{line-height:.92;letter-spacing:10px;font-size:clamp(38px,6vw,78px);font-weight:1000;background:linear-gradient(#fff4b7 0%,#ffc14c 55%,#ff7b21 100%);-webkit-background-clip:text;color:transparent;text-shadow:0 14px 40px rgba(255,124,24,.28)}.subtitle{margin-top:12px;letter-spacing:7px;font-weight:800;color:#d8e8ff;font-size:14px}.badges{margin-left:auto;display:flex;flex-direction:column;gap:12px;align-items:flex-end}.badge{border:1px solid rgba(255,213,106,.58);border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));padding:12px 18px;font-weight:900;color:#fff3c7;box-shadow:inset 0 0 18px rgba(255,214,106,.08)}.stage{margin:0 auto;width:calc(100% - 70px);height:calc(100% - 160px);border-radius:30px;padding:24px 24px 20px;background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.15);box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}.headline{text-align:center}.headline h1{margin:0;font-size:clamp(28px,4vw,48px);color:#fff1bd;text-shadow:0 0 24px rgba(255,210,112,.35)}.headline p{margin:8px 0 0;color:#d6dceb;font-weight:800}.ticketArea{height:calc(100% - 92px);display:flex;align-items:center;justify-content:center;position:relative}.ticket{width:min(760px,92vw);height:min(455px,52vh);min-height:330px;border-radius:28px;position:relative;background:linear-gradient(135deg,#fff2aa 0%,#ff8bb2 31%,#8a48ff 65%,#19d9ff 100%);box-shadow:0 28px 70px rgba(0,0,0,.42),0 0 38px rgba(255,76,195,.42);overflow:hidden;transform:perspective(900px) rotateX(1.5deg)}.ticket:before{content:"";position:absolute;inset:18px;border:2px dashed rgba(255,255,255,.55);border-radius:22px}.ticket:after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 0 35%,rgba(255,255,255,.32) 46%,transparent 58%);animation:sweep 4.8s infinite;mix-blend-mode:screen}@keyframes sweep{from{transform:translateX(-90%)}to{transform:translateX(110%)}}
.holes{position:absolute;top:26px;bottom:26px;width:20px;background:repeating-radial-gradient(circle at 50% 11px,#111 0 8px,transparent 9px 44px);opacity:.9}.holes.left{left:-8px}.holes.right{right:-8px}.ticketLogo{position:absolute;left:48px;top:42px;width:112px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}.tag{position:absolute;right:42px;top:42px;border-radius:999px;padding:12px 24px;background:rgba(88,31,95,.45);font-weight:1000;letter-spacing:3px;color:#fff3b5}.scratchBox{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:72%;height:52%;border-radius:24px;overflow:hidden;background:linear-gradient(135deg,#fff8df,#fff0b3 45%,#ffe2ea);box-shadow:inset 0 0 0 2px rgba(255,255,255,.75),0 14px 35px rgba(0,0,0,.18)}.resultLayer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}.wm{position:absolute;inset:0;opacity:.13;background-image:repeating-linear-gradient(-28deg,transparent 0 30px,rgba(101,40,0,.35) 31px 33px),repeating-linear-gradient(0deg,transparent 0 58px,rgba(255,151,0,.18) 60px 62px)}.wmText{position:absolute;inset:-20%;display:grid;grid-template-columns:repeat(5,1fr);gap:18px;transform:rotate(-18deg);font-size:26px;font-weight:1000;color:#8b3b00;opacity:.16;white-space:nowrap}.resultTitle{font-size:17px;font-weight:1000;color:#7b2b00;letter-spacing:7px;z-index:1}.amount{z-index:1;font-size:clamp(62px,10vw,112px);line-height:.95;font-weight:1000;letter-spacing:2px;background:linear-gradient(#8b3500,#d46a1d,#5d2100);-webkit-background-clip:text;color:transparent;text-shadow:0 8px 22px rgba(154,66,0,.18)}.drawTime{z-index:1;font-weight:1000;color:#803a00;font-size:16px}.scratchCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair;z-index:5}.scratchHint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;text-align:center;pointer-events:none;font-size:22px;font-weight:1000;letter-spacing:2px;color:#fff;text-shadow:0 2px 8px #000,0 0 18px rgba(255,255,255,.7)}.progress{position:absolute;left:50%;bottom:42px;transform:translateX(-50%);width:70%;height:12px;border-radius:999px;background:rgba(73,37,100,.38);box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#ffe66b,#ff9e2e,#38e6ff);border-radius:inherit;box-shadow:0 0 15px rgba(255,230,107,.75)}.code{position:absolute;left:48px;bottom:38px;padding:10px 16px;border-radius:12px;background:rgba(83,32,74,.42);font-weight:1000;color:#fff1d3}.live{position:absolute;right:52px;bottom:42px;font-weight:1000;color:#e6fbff;letter-spacing:1px}.controls{position:absolute;left:50%;bottom:-72px;transform:translateX(-50%);display:flex;gap:14px}.btn{border:none;border-radius:16px;padding:15px 28px;font-weight:1000;letter-spacing:2px;color:#211003;background:linear-gradient(180deg,#fff39d,#ffc43e 52%,#ff8223);box-shadow:0 14px 28px rgba(255,138,35,.32),inset 0 1px 0 rgba(255,255,255,.75);cursor:pointer}.btn.secondary{background:linear-gradient(180deg,#dbfbff,#58dfff 52%,#2a97ff)}.toast{position:fixed;z-index:20;left:50%;top:22px;transform:translateX(-50%) translateY(-120%);background:rgba(9,13,28,.9);border:1px solid rgba(255,214,106,.5);border-radius:18px;padding:14px 20px;color:#fff5c8;font-weight:900;box-shadow:0 18px 60px rgba(0,0,0,.45);transition:.35s}.toast.show{transform:translateX(-50%) translateY(0)}
.done .scratchHint{display:none}.done .ticket{animation:winPulse 1.7s ease-in-out infinite alternate}.done .amount{animation:pop .6s cubic-bezier(.2,1.4,.2,1) both}@keyframes pop{from{transform:scale(.72);filter:blur(3px)}to{transform:scale(1);filter:blur(0)}}@keyframes winPulse{to{box-shadow:0 30px 80px rgba(0,0,0,.42),0 0 70px rgba(255,208,79,.78)}}
@media(max-width:720px){.wrap{padding:8px}.machine{height:100vh;width:100vw;border-radius:0}.machine:before{inset:8px;border-radius:18px}.top{height:105px;padding:18px}.logo{width:96px}.title{font-size:34px;letter-spacing:5px}.subtitle{font-size:11px;letter-spacing:4px}.badges{gap:6px}.badge{padding:8px 10px;font-size:12px}.stage{width:calc(100% - 28px);height:calc(100% - 122px);padding:16px 10px}.headline h1{font-size:30px}.headline p{font-size:13px}.ticketArea{height:calc(100% - 82px)}.ticket{width:96%;height:430px;min-height:430px}.scratchBox{width:76%;height:47%;top:52%}.ticketLogo{width:92px;left:34px;top:36px}.tag{right:28px;top:36px;padding:10px 14px;font-size:12px}.amount{font-size:64px}.controls{bottom:-64px}.btn{padding:13px 18px}.code{left:30px;bottom:32px;font-size:12px}.live{right:34px;bottom:36px;font-size:12px}}
</style>
</head>
<body>
<canvas id="fx"></canvas><div class="toast" id="toast"></div>
<div class="wrap"><main class="machine"><header class="top"><img class="logo" src="mm99-logo.png" alt="MM99"><div><div class="title">HỘP QUÀ<br>MAY MẮN</div><div class="subtitle">PREMIUM SCRATCH GAME</div></div><div class="badges"><div class="badge" id="clock">--:--:--</div><div class="badge" id="tries">Lượt hôm nay: 0/2</div></div></header><section class="stage" id="stage"><div class="headline"><h1>Cào lớp bạc để nhận thưởng</h1><p>Cào gần 50% khu vực bạc, phần thưởng sẽ tự động hiển thị.</p></div><div class="ticketArea"><div class="ticket"><div class="holes left"></div><div class="holes right"></div><img class="ticketLogo" src="mm99-logo.png" alt="MM99"><div class="tag">THẺ MAY MẮN</div><div class="scratchBox" id="scratchBox"><div class="resultLayer"><div class="wm"></div><div class="wmText" id="wmText"></div><div class="resultTitle">CHÚC MỪNG</div><div class="amount" id="amount">8.888</div><div class="drawTime" id="drawTime"></div></div><canvas class="scratchCanvas" id="scratchCanvas"></canvas><div class="scratchHint" id="scratchHint">CÀO LỚP BẠC</div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="code" id="code">MM99-----</div><div class="live">LIVE CODE</div><div class="controls"><button class="btn" id="startBtn">BẮT ĐẦU</button><button class="btn secondary" id="resetBtn">LÀM MỚI THẺ</button></div></div></div></section></main></div>
<script>
(()=>{
'use strict';
const prizes=[['4888',5],['6,888',5],['8.888',25],['9.888',25],['10.888',10],['12,888',10],['13.888',8],['14.888',6],['15.888',3],['18.888',3]];
const maxDaily=2;const key='mm99_scratch_real_'+new Date().toISOString().slice(0,10);let attempts=Number(localStorage.getItem(key)||0);let started=false, revealed=false, drawing=false, last=null, prize='8.888';
const $=id=>document.getElementById(id), stage=$('stage'), clock=$('clock'), tries=$('tries'), amount=$('amount'), drawTime=$('drawTime'), code=$('code'), toast=$('toast'), canvas=$('scratchCanvas'), box=$('scratchBox'), bar=$('bar'), hint=$('scratchHint'), startBtn=$('startBtn'), resetBtn=$('resetBtn');const ctx=canvas.getContext('2d',{willReadFrequently:true});
function fmt(d=new Date()){return d.toLocaleTimeString('vi-VN',{hour12:false})+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}function updateClock(){clock.textContent=fmt();tries.textContent=`Lượt hôm nay: ${attempts}/${maxDaily}`}setInterval(updateClock,1000);updateClock();
function pick(){let r=Math.random()*100,s=0;for(const [v,p] of prizes){s+=p;if(r<=s)return v}return prizes.at(-1)[0]}
function randomCode(){return 'MM99-'+Math.random().toString(36).slice(2,7).toUpperCase()}
function show(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}
function wm(){const w=$('wmText');w.innerHTML='';for(let i=0;i<50;i++){const span=document.createElement('span');span.textContent='MM99 CÀO MAY MẮN';w.appendChild(span)}}wm();
function resizeScratch(){const r=box.getBoundingClientRect(), ratio=devicePixelRatio||1;canvas.width=Math.round(r.width*ratio);canvas.height=Math.round(r.height*ratio);ctx.setTransform(ratio,0,0,ratio,0,0);paintSilver(r.width,r.height)}
function paintSilver(w,h){ctx.globalCompositeOperation='source-over';const g=ctx.createLinearGradient(0,0,w,h);g.addColorStop(0,'#8796a6');g.addColorStop(.18,'#f6fbff');g.addColorStop(.36,'#9aa8b8');g.addColorStop(.56,'#e8eef5');g.addColorStop(.78,'#738596');g.addColorStop(1,'#dce7f0');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.globalAlpha=.28;for(let x=-h;x<w+h;x+=18){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+h,h);ctx.lineWidth=8;ctx.strokeStyle='#fff';ctx.stroke()}ctx.globalAlpha=.18;ctx.fillStyle='#101824';for(let i=0;i<1000;i++){ctx.fillRect(Math.random()*w,Math.random()*h,1,1)}ctx.globalAlpha=1;ctx.font='900 22px Arial';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillText('CÀO LỚP BẠC',w/2,h/2-8);ctx.font='800 13px Arial';ctx.fillText('MM99 VERIFY',w/2,h/2+18)}
function begin(){if(attempts>=maxDaily){show('Hôm nay bạn đã hết lượt.');return}if(started&&!revealed){show('Hãy cào thẻ hiện tại.');return}attempts++;localStorage.setItem(key,attempts);updateClock();started=true;revealed=false;stage.classList.remove('done');prize=pick();amount.textContent=prize;drawTime.textContent=fmt();code.textContent=randomCode();bar.style.width='0%';hint.style.display='block';resizeScratch();show('Bắt đầu cào thẻ!')}
function pos(e){const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}}
function scratch(x,y,force=false){if(!started||revealed)return;ctx.globalCompositeOperation='destination-out';ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=force?48:34;if(last){ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(x,y);ctx.stroke()}ctx.beginPath();ctx.arc(x,y,force?25:18,0,Math.PI*2);ctx.fill();last={x,y};if(Math.random()<.35)calcProgress()}
function calcProgress(){const w=canvas.width,h=canvas.height;const data=ctx.getImageData(0,0,w,h).data;let clear=0,total=0;for(let i=3;i<data.length;i+=32){total++;if(data[i]<20)clear++}const pct=clear/total;bar.style.width=Math.min(100,Math.round(pct*100))+'%';if(pct>=.50&&!revealed){reveal()}}
function reveal(){revealed=true;hint.style.display='none';ctx.globalCompositeOperation='destination-out';ctx.fillRect(0,0,canvas.width,canvas.height);stage.classList.add('done');confetti();show('Chúc mừng!')}
canvas.addEventListener('pointerdown',e=>{e.preventDefault();if(!started){show('Bấm BẮT ĐẦU trước.');return}drawing=true;last=null;canvas.setPointerCapture(e.pointerId);const p=pos(e);scratch(p.x,p.y,true)});canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);scratch(p.x,p.y)});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{drawing=false;last=null;calcProgress()}));
startBtn.onclick=begin;resetBtn.onclick=()=>{if(!started||revealed){begin()}else show('Cào xong thẻ hiện tại trước.')};window.addEventListener('resize',()=>{if(started&&!revealed)resizeScratch()});
const fx=$('fx'), fctx=fx.getContext('2d');let parts=[];function sizeFx(){fx.width=innerWidth*devicePixelRatio;fx.height=innerHeight*devicePixelRatio;fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',sizeFx);sizeFx();function confetti(){for(let i=0;i<220;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*260,y:innerHeight*.48+(Math.random()-.5)*80,vx:(Math.random()-.5)*9,vy:-Math.random()*9-3,g:.15+Math.random()*.12,s:3+Math.random()*6,r:Math.random()*Math.PI,c:['#ffe66b','#ff4fc3','#55e7ff','#8d6cff','#ffffff'][i%5],life:120+Math.random()*80})}function loop(){fctx.clearRect(0,0,innerWidth,innerHeight);for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.r+=.08;p.life--;fctx.save();fctx.translate(p.x,p.y);fctx.rotate(p.r);fctx.fillStyle=p.c;fctx.globalAlpha=Math.max(0,p.life/120);fctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.65);fctx.restore()}parts=parts.filter(p=>p.life>0&&p.y<innerHeight+80);requestAnimationFrame(loop)}loop();
// keep amount covered before start too
prize=pick();amount.textContent=prize;drawTime.textContent=fmt();code.textContent=randomCode();setTimeout(resizeScratch,100);
})();
</script>
</body>
</html>
